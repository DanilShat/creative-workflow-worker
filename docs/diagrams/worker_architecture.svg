<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Creative Workflow worker architecture</title>
  <desc id="desc">The worker polls the operator API, runs Playwright browser flows, exposes Claude MCP tools, and bridges to local Adobe apps.</desc>
  <style>
    .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:8}.accent{fill:#ecfeff;stroke:#0891b2}.tool{fill:#f0fdf4;stroke:#16a34a}.text{font:600 16px Arial, sans-serif;fill:#0f172a}.small{font:13px Arial, sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" x="0" y="0" width="980" height="300"/>
  <rect class="box accent" x="40" y="95" width="150" height="90"/>
  <text class="text" x="75" y="135">Operator</text><text class="small" x="70" y="157">FastAPI queue</text>
  <rect class="box" x="250" y="95" width="150" height="90"/>
  <text class="text" x="285" y="135">Worker</text><text class="small" x="278" y="157">poll/claim/run</text>
  <rect class="box tool" x="460" y="35" width="150" height="75"/>
  <text class="text" x="495" y="77">Playwright</text>
  <rect class="box tool" x="460" y="130" width="150" height="75"/>
  <text class="text" x="505" y="172">Claude</text><text class="small" x="494" y="190">MCP tools</text>
  <rect class="box tool" x="670" y="35" width="130" height="75"/>
  <text class="text" x="700" y="77">Gemini</text>
  <rect class="box tool" x="670" y="130" width="130" height="75"/>
  <text class="text" x="699" y="172">Freepik</text>
  <rect class="box tool" x="830" y="83" width="120" height="75"/>
  <text class="text" x="858" y="125">Adobe</text><text class="small" x="850" y="143">PS / AE</text>
  <line class="arrow" x1="190" y1="140" x2="250" y2="140"/>
  <line class="arrow" x1="400" y1="118" x2="460" y2="72"/>
  <line class="arrow" x1="400" y1="155" x2="460" y2="168"/>
  <line class="arrow" x1="610" y1="72" x2="670" y2="72"/>
  <line class="arrow" x1="610" y1="168" x2="670" y2="168"/>
  <line class="arrow" x1="800" y1="140" x2="830" y2="122"/>
</svg>
